<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChattingTerminalors</title>
<link rel="icon" href="logo.ico?v=6">

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: #0f0f0f;
  color: #ddd;
  font-family: 'Retro', Arial, sans-serif;
}

@font-face {
  font-family: 'Retro';
  src: url('retro.ttf') format('truetype');
  font-display: swap;
}

/* SIDEBAR */
#sidebar {
  width: 220px;
  background: #1a1a1a;
  padding: 10px;
  border-right: 1px solid #300;
}
#sidebar h2 {
  font-size: 14px;
  color: #ff4444;
  margin-bottom: 10px;
}
.user {
  padding: 5px;
  font-size: 13px;
  color: #bbb;
}

/* CHAT */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}
.msg {
  margin-bottom: 12px;
}
.name {
  font-weight: bold;
  color: #ff5555;
}
.time {
  font-size: 11px;
  color: #666;
  margin-left: 5px;
}
.text {
  margin-top: 2px;
}
#input {
  border: none;
  outline: none;
  padding: 15px;
  background: #1a1a1a;
  color: #fff;
  border-top: 1px solid #300;
  font-family: 'Retro', Arial, sans-serif;
  font-size: 15px;
}

a { color: #4aa3ff; }
.emoji {
  height: 1.1em;
  vertical-align: middle;
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>ПОЛЬЗОВАТЕЛИ</h2>
  <div id="users"></div>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="input" placeholder="Напишите сообщение...">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ================== FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyC4SGB78L-tDPtuKlQdGZnpFZzeMrJAyvQ",
  authDomain: "doxxing-e1f0d.firebaseapp.com",
  projectId: "doxxing-e1f0d",
  storageBucket: "doxxing-e1f0d.firebasestorage.app",
  messagingSenderId: "621070813364",
  appId: "1:621070813364:web:671b70e0c312c89b0b2fe1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");
const usersDiv = document.getElementById("users");

let username = null;

// Pede nome só uma vez
if (!localStorage.getItem("ct_user")) {
  username = prompt("Введите ваш никнейм:", "гость" + Math.floor(Math.random() * 9999));
  if (!username || username.trim() === "") {
    username = "гость" + Math.floor(Math.random() * 9999);
  }
  username = username.trim().substring(0, 25);
  localStorage.setItem("ct_user", username);
} else {
  username = localStorage.getItem("ct_user");
}

// ================== FUNÇÕES ==================
function escapeHTML(str) {
  const p = document.createElement("p");
  p.textContent = str;
  return p.innerHTML;
}

function parse(text) {
  let safe = escapeHTML(text);
  safe = safe.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank">${url}</a>`);
  
  const emojiRegex = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/gu;
  safe = safe.replace(emojiRegex, emoji => {
    const code = Array.from(emoji).map(c => c.codePointAt(0).toString(16)).join("-");
    return `<img class="emoji" src="https://twemoji.maxcdn.com/v/latest/72x72/${code}.png" alt="${emoji}">`;
  });
  return safe;
}

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}

// ================== USUÁRIOS ONLINE ==================
const userRef = db.ref("chattingterminalors/users").push();
userRef.set({ name: username });
userRef.onDisconnect().remove();

db.ref("chattingterminalors/users").on("value", snap => {
  usersDiv.innerHTML = "";
  snap.forEach(c => {
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = c.val().name;
    usersDiv.appendChild(div);
  });
});

// ================== MENSAGENS ==================
db.ref("chattingterminalors/messages")
  .limitToLast(100)
  .on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `
      <span class="name">${escapeHTML(m.name)}</span>
      <span class="time">${getTime()}</span>
      <div class="text">${parse(m.text)}</div>
    `;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

// ================== ENVIAR MENSAGEM ==================
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && input.value.trim()) {
    db.ref("chattingterminalors/messages").push({
      name: username,
      text: input.value,
      time: Date.now()
    });
    input.value = "";
  }
});
</script>
</body>
</html>
